<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>তাালীমুল মুসলিমিন অ্যাপ</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        header {
            background-color: #0f5132;
            color: white;
            width: 100%;
            max-width: 600px;
            text-align: center;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .card {
            background: white;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h2 {
            color: #0f5132;
            margin-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 5px;
        }
        .hadith-text {
            font-style: italic;
            color: #555;
            line-height: 1.6;
        }
        .counter-box {
            text-align: center;
            padding: 20px;
        }
        .counter-number {
            font-size: 48px;
            font-weight: bold;
            color: #0f5132;
            margin: 10px 0;
        }
        button {
            background-color: #0f5132;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            transition: 0.2s;
        }
        button:active {
            transform: scale(0.95);
        }
        button.reset {
            background-color: #dc3545;
        }
        footer {
            margin-top: 20px;
            color: #777;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <h1>তাালীমুল মুসলিমিন</h1>
        <p>ইসলামিক জীবনযাপনের সহজ সহযোগী</p>
    </header>

    <!-- আজকের হাদিস সেকশন -->
    <div class="card">
        <h2>আজকের বাণী</h2>
        <p class="hadith-text" id="hadith">"তোমাদের মধ্যে সেই ব্যক্তি সর্বোত্তম, যে কুরআন শেখে এবং অপরকে শিক্ষা দেয়।" (সহীহ বুখারী)</p>
    </div>

    <!-- ডিজিটাল তাসবিহ সেকশন -->
    <div class="card">
        <h2>ডিজিটাল তাসবিহ কাউন্টার</h2>
        <div class="counter-box">
            <p>আলহামদুলিল্লাহ / সুবহানাল্লাহ / আল্লাহু আকবার</p>
            <div class="counter-number" id="count">0</div>
            <button onclick="increment()">গণনা করুন (+)</button>
            <button class="reset" onclick="resetCounter()">রিসেট</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 তাালীমুল মুসলিমিন অ্যাপ। সর্বস্বত্ব সংরক্ষিত।</p>
    </footer>

    <script>
        // তাসবিহ কাউন্টার লজিক
        let count = 0;
        const countDisplay = document.getElementById('count');

        function increment() {
            count++;
            countDisplay.innerText = count;
        }

        function resetCounter() {
            count = 0;
            countDisplay.innerText = count;
        }

        // হাদিস পরিবর্তনের লজিক (পেজ রিফ্রেশ করলে পরিবর্তন হবে)
        const hadiths = [
            "\"তোমাদের মধ্যে সেই ব্যক্তি সর্বোত্তম, যে কুরআন শেখে এবং অপরকে শিক্ষা দেয়।\" (সহীহ বুখারী)",
            "\"সহজ করো, কঠিন করো না; সুসংবাদ দাও, দূরে সরিয়ে দিও না।\" (সহীহ বুখারী)",
            "\"পবিত্রতা ঈমানের অর্ধেক।\" (সহীহ মুসলিম)",
            "\"প্রকৃত মুসলিম সেই, যার জিব ও হাত থেকে অন্য মুসলিম নিরাপদ থাকে।\" (সহীহ বুখারী)"
        ];

        const randomHadith = hadiths[Math.floor(Math.random() * hadiths.length)];
        document.getElementById('hadith').innerText = randomHadith;
    </script>
</body>
</html>
